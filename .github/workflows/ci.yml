# =============================================================================
# .github/workflows/ci.yml — Intégration continue
# -----------------------------------------------------------------------------
# Ce workflow s'exécute à chaque push et à chaque Pull Request ciblant la
# branche « main ». Il comprend :
#
#   - un job « qualite » (obligatoire) : formatage, vet, lint, staticcheck,
#     compilation et tests unitaires (avec détection des data races) ;
#   - un job « integration » (optionnel) : démarre un service MariaDB 11,
#     charge le schéma SQL du projet, puis exécute les tests marqués par le
#     tag de compilation « integration ». Tant qu'aucun test de ce type
#     n'existe encore dans le dépôt, cette étape réussit trivialement (« no
#     test files »). Pour désactiver complètement ce second job, il suffit de
#     supprimer la section « integration: » ci-dessous.
# =============================================================================
name: Intégration continue

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Annule une exécution précédente encore en cours pour la même branche/PR dès
# qu'un nouveau push arrive, pour ne pas gaspiller de minutes CI sur du code
# déjà dépassé.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Permission minimale nécessaire : ce workflow ne fait que lire le dépôt.
permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # Job obligatoire : formatage, analyse statique, compilation, tests.
  # ---------------------------------------------------------------------------
  qualite:
    name: Contrôle qualité
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le code source
        uses: actions/checkout@v4

      - name: Installer Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache: true

      - name: Vérifier le formatage (gofmt)
        run: |
          fichiers_non_formates="$(gofmt -l .)"
          if [ -n "$fichiers_non_formates" ]; then
            echo "Les fichiers suivants ne sont pas formatés avec gofmt :"
            echo "$fichiers_non_formates"
            echo "Lancez « make formater » (ou « gofmt -w . ») puis recommittez."
            exit 1
          fi
          echo "Tous les fichiers sont correctement formatés."

      - name: go vet
        run: go vet ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.64.8

      - name: staticcheck
        run: go run honnef.co/go/tools/cmd/staticcheck@latest ./...

      - name: Compiler
        run: go build ./...

      - name: Tests
        run: go test -race -count=1 ./...

  # ---------------------------------------------------------------------------
  # Job optionnel : tests d'intégration nécessitant une vraie base MariaDB.
  # Ne démarre que si le job « qualite » a réussi, pour ne pas gaspiller de
  # ressources sur une base à mettre en place si l'essentiel échoue déjà.
  # ---------------------------------------------------------------------------
  integration:
    name: Tests d'intégration (MariaDB)
    needs: qualite
    runs-on: ubuntu-latest
    services:
      # Service MariaDB 11, identique à la version utilisée en développement
      # et en production (voir docker-compose.yml). Les identifiants ci-dessous
      # sont des valeurs de test, sans rapport avec un quelconque environnement
      # réel.
      mariadb:
        image: mariadb:11
        env:
          MARIADB_ROOT_PASSWORD: ci_motdepasse_root_uniquement_pour_les_tests_automatises
          MARIADB_DATABASE: bibliotheque
          MARIADB_USER: app_bibliotheque
          MARIADB_PASSWORD: ci_motdepasse_app_uniquement_pour_les_tests
        ports:
          - 3306:3306
        # « healthcheck.sh » est le script de sonde fourni par l'image officielle
        # MariaDB (le même que celui utilisé par docker-compose.yml) : on attend
        # que le serveur soit joignable ET qu'InnoDB soit prêt avant de lancer
        # les étapes suivantes.
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20
          --health-start-period=40s
    # Variables de connexion cohérentes avec internal/config (voir .env.example) :
    # l'application et les scripts de chargement du schéma s'y connectent via
    # 127.0.0.1, le service étant exposé sur le port hôte 3306.
    env:
      BDD_HOTE: 127.0.0.1
      BDD_PORT: 3306
      BDD_NOM: bibliotheque
      BDD_UTILISATEUR: app_bibliotheque
      BDD_MOT_DE_PASSE: ci_motdepasse_app_uniquement_pour_les_tests
      BDD_ROOT_MOT_DE_PASSE: ci_motdepasse_root_uniquement_pour_les_tests_automatises
      JWT_SECRET: ci-secret-de-test-uniquement-32-caracteres-minimum
    steps:
      - name: Récupérer le code source
        uses: actions/checkout@v4

      - name: Installer Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache: true

      - name: Installer le client MariaDB
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends mariadb-client

      - name: Charger le schéma SQL (dans l'ordre des scripts sql/)
        run: |
          for fichier in \
            sql/schema/01_privileges.sql \
            sql/schema/02_tables.sql \
            sql/schema/03_index.sql \
            sql/functions/04_fonctions.sql \
            sql/views/05_vues.sql \
            sql/procedures/06_procedures.sql \
            sql/triggers/07_triggers.sql \
            sql/events/08_events.sql \
            sql/data/09_seed.sql; do
            echo "Chargement de $fichier..."
            mariadb --host="$BDD_HOTE" --port="$BDD_PORT" --user=root \
              --password="$BDD_ROOT_MOT_DE_PASSE" "$BDD_NOM" <"$fichier"
          done

      - name: Tests d'intégration
        run: go test -tags=integration -race -count=1 ./...
