# =============================================================================
# .github/dependabot.yml — Mises à jour automatiques des dépendances
# -----------------------------------------------------------------------------
# Dependabot ouvre automatiquement une Pull Request lorsqu'une mise à jour
# (notamment de sécurité) est disponible pour l'une de nos dépendances. On
# surveille ici deux écosystèmes :
#
#   - « gomod »          : les dépendances Go déclarées dans go.mod / go.sum ;
#   - « github-actions » : les actions utilisées par nos workflows CI.
# =============================================================================
version: 2
updates:
  # --- Dépendances Go (go.mod / go.sum) ---------------------------------------
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dépendances"
      - "go"
    commit-message:
      prefix: "chore"
      include: "scope"

  # --- Actions utilisées dans les workflows GitHub (.github/workflows) --------
  - package-ecosystem: "github-actions"
    directory: "/.github/workflows"
    schedule:
      interval: "weekly"
    labels:
      - "dépendances"
      - "ci"
    commit-message:
      prefix: "ci"
      include: "scope"
