# =============================================================================
# docker-compose.yml — Orchestration de la pile complète (API + MariaDB)
# -----------------------------------------------------------------------------
# Un seul « docker compose up » suffit à démarrer :
#   1. MariaDB, initialisée avec le schéma, les procédures, les triggers, les
#      events et un jeu de données de démonstration ;
#   2. l'API Go, qui attend que la base soit SAINE avant de démarrer.
#
# La configuration provient du fichier .env (voir .env.example). Les valeurs par
# défaut « ${VAR:-valeur} » permettent de démarrer même sans .env, mais on
# DOIT définir de vrais secrets en production.
#
# NB : la clé « version » est facultative avec Docker Compose v2 (elle est
# conservée pour rester compatible avec l'ancien binaire docker-compose v1).
# =============================================================================
version: "3.9"

# Le nom de projet (préfixe des conteneurs/réseaux/volumes) est déduit du dossier,
# ou défini via la variable COMPOSE_PROJECT_NAME dans .env (voir .env.example).

services:
  # ---------------------------------------------------------------------------
  # Service base de données : MariaDB 11
  # ---------------------------------------------------------------------------
  mariadb:
    image: mariadb:11
    container_name: bibliotheque_mariadb
    # Politique de redémarrage : relance le conteneur sauf s'il a été arrêté
    # manuellement. Adapté à un service qui doit rester disponible.
    restart: unless-stopped
    # --event-scheduler=ON active l'ordonnanceur d'EVENTS dès le démarrage, et
    # de façon persistante (survit à un redémarrage du conteneur).
    command: --event-scheduler=ON
    environment:
      # Mot de passe root (administration). À CHANGER en production.
      MARIADB_ROOT_PASSWORD: ${BDD_ROOT_MOT_DE_PASSE:-changez_moi_root}
      # Base et utilisateur applicatif créés automatiquement par l'image.
      MARIADB_DATABASE: ${BDD_NOM:-bibliotheque}
      MARIADB_USER: ${BDD_UTILISATEUR:-app_bibliotheque}
      MARIADB_PASSWORD: ${BDD_MOT_DE_PASSE:-changez_moi_app}
    ports:
      # Expose MariaDB sur l'hôte (utile pour se connecter avec un client SQL).
      # En production, on retirerait cette exposition pour ne pas ouvrir la base.
      - "${BDD_PORT_HOTE:-3306}:3306"
    volumes:
      # Volume NOMMÉ pour PERSISTER les données entre les redémarrages.
      - donnees_mariadb:/var/lib/mysql
      # Configuration serveur (jeu de caractères, collation, sql_mode...).
      - ./docker/mariadb/conf.d:/etc/mysql/conf.d:ro
      # Scripts d'initialisation, exécutés DANS L'ORDRE au premier démarrage
      # (base vierge). L'ordre est garanti par les préfixes numériques 01 à 09.
      - ./sql/schema/01_privileges.sql:/docker-entrypoint-initdb.d/01_privileges.sql:ro
      - ./sql/schema/02_tables.sql:/docker-entrypoint-initdb.d/02_tables.sql:ro
      - ./sql/schema/03_index.sql:/docker-entrypoint-initdb.d/03_index.sql:ro
      - ./sql/functions/04_fonctions.sql:/docker-entrypoint-initdb.d/04_fonctions.sql:ro
      - ./sql/views/05_vues.sql:/docker-entrypoint-initdb.d/05_vues.sql:ro
      - ./sql/procedures/06_procedures.sql:/docker-entrypoint-initdb.d/06_procedures.sql:ro
      - ./sql/triggers/07_triggers.sql:/docker-entrypoint-initdb.d/07_triggers.sql:ro
      - ./sql/events/08_events.sql:/docker-entrypoint-initdb.d/08_events.sql:ro
      - ./sql/data/09_seed.sql:/docker-entrypoint-initdb.d/09_seed.sql:ro
    healthcheck:
      # Sonde fournie par l'image MariaDB : la base est-elle joignable et InnoDB prête ?
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 20
      # Laisse à MariaDB le temps d'exécuter les scripts d'init avant de compter les échecs.
      start_period: 40s
    networks:
      - reseau_bibliotheque

  # ---------------------------------------------------------------------------
  # Service applicatif : l'API Go
  # ---------------------------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bibliotheque_api
    restart: unless-stopped
    # L'API ne démarre QUE lorsque MariaDB est « healthy » (schéma chargé) :
    # évite les erreurs de connexion au premier démarrage.
    depends_on:
      mariadb:
        condition: service_healthy
    environment:
      APP_ENVIRONNEMENT: ${APP_ENVIRONNEMENT:-developpement}
      SERVEUR_ADRESSE: 0.0.0.0
      SERVEUR_PORT: 8080
      # L'API joint MariaDB par le NOM DE SERVICE « mariadb » (DNS interne Docker).
      BDD_HOTE: mariadb
      BDD_PORT: 3306
      BDD_NOM: ${BDD_NOM:-bibliotheque}
      BDD_UTILISATEUR: ${BDD_UTILISATEUR:-app_bibliotheque}
      BDD_MOT_DE_PASSE: ${BDD_MOT_DE_PASSE:-changez_moi_app}
      # Secret de signature JWT : au moins 32 caractères. À CHANGER absolument.
      JWT_SECRET: ${JWT_SECRET:-changez_moi_secret_jwt_de_32_caracteres_minimum}
      JWT_DUREE_ACCES: ${JWT_DUREE_ACCES:-15m}
      JWT_DUREE_RAFRAICHISSEMENT: ${JWT_DUREE_RAFRAICHISSEMENT:-168h}
      LOG_FORMAT: ${LOG_FORMAT:-json}
      LOG_NIVEAU: ${LOG_NIVEAU:-info}
      CORS_ORIGINES_AUTORISEES: ${CORS_ORIGINES_AUTORISEES:-*}
      RATE_LIMIT_PAR_SECONDE: ${RATE_LIMIT_PAR_SECONDE:-10}
      RATE_LIMIT_RAFALE: ${RATE_LIMIT_RAFALE:-20}
    ports:
      - "${SERVEUR_PORT_HOTE:-8080}:8080"
    networks:
      - reseau_bibliotheque

# Réseau dédié : isole la communication entre l'API et la base. Seuls les
# services de ce réseau se voient (par leur nom).
networks:
  reseau_bibliotheque:
    driver: bridge

# Volume nommé : les données MariaDB survivent à « docker compose down »
# (mais pas à « docker compose down -v », qui supprime les volumes).
volumes:
  donnees_mariadb:
    driver: local
